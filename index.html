<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Kayla Willis | McLennan Community College</title>
    <style>
        /* Modern CSS Reset & Variables */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1a202c;
            --text-muted: #4a5568;
            --accent-color: #1e3a8a;
            --accent-hover: #172e6f;
            --btn-text: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Dark Mode Variables */
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.8);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --accent-color: #3b82f6;
            --accent-hover: #60a5fa;
            --btn-text: #1e293b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            --border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Profile Card */
        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        .position {
            font-size: 1.1rem;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .institution {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 32px;
        }

        /* Button Link */
        .btn-link {
            display: inline-block;
            background-color: var(--accent-color);
            color: var(--btn-text);
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-link:hover {
            background-color: var(--accent-hover);
            transform: scale(1.02);
        }

        .btn-link:active {
            transform: scale(0.98);
        }

        /* Theme Toggle Button */
        .theme-toggle {
            margin-top: 24px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: underline;
            transition: color 0.2s ease;
        }

        .theme-toggle:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <!-- Main Profile Card -->
    <main class="profile-card">
        <h1>Dr. Kayla Willis</h1>
        <p class="position">Associate Professor</p>
        <p class="institution">McLennan Community College</p>
        
        <!-- Link to ed-phil.html -->
        <a href="ed-phil.html" class="btn-link">Educational Philosophy</a>
    </main>

    <!-- Theme Switcher Utility -->
    <button class="theme-toggle" id="themeBtn">Switch to Dark Mode</button>

    <script>
        const themeBtn = document.getElementById('themeBtn');
        
        // Check system preference
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (prefersDark) {
            document.body.setAttribute('data-theme', 'dark');
            themeBtn.textContent = 'Switch to Light Mode';
        }

        // Toggle theme on click
        themeBtn.addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.body.removeAttribute('data-theme');
                themeBtn.textContent = 'Switch to Dark Mode';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                themeBtn.textContent = 'Switch to Light Mode';
            }
        });
    </script>
</body>
</html>
